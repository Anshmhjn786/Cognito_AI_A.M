data:
  raw_path: "data/splits/videos"
  processed_path: "data/processed/frames"
  video_extensions: [".mp4", ".avi", ".mov"]

classes:
  real: 0
  fake: 1

frame_extraction:
  num_frames: 16
  method: "uniform"
  min_frames_required: 10

preprocessing:
  image_size: 224
  face_detection: "retinaface"
  skip_no_face: true
  save_format: "jpg"
  jpeg_quality: 95

splits:
  train: 0.7
  val: 0.15
  test: 0.15

logging:
  verbose: true
  save_failed_videos: true