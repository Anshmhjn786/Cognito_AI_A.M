# Video Model Training Pipeline Configuration

data:
  raw_path: "data/raw/videos"
  model_save_path: "models/video/best_weights.pth"
  train_subset_size: 3000
  tune_subset_size: 1000

model:
  frame_count: 32
  frame_size: 224
  hidden_dim: 256
  dropout: 0.3

training:
  batch_size: 8
  learning_rate: 1e-4
  phase1_epochs: 2
  phase2_epochs: 8
  phase1_lr: 1e-3
  phase2_lr: 1e-5
  pin_memory: True
  num_workers: 0

tuning:
  trials: 10
  epochs_per_trial: 2

logging:
  level: "INFO"